version: "3.9"

# ════════════════════════════════════════════════════════════════════════════
#  QUDE — Docker Compose
#  Development stack: Backend API + PostgreSQL + Redis + pgAdmin
#
#  Usage:
#    docker compose up -d          # Start all services
#    docker compose up -d postgres redis  # Infra only (run backend locally)
#    docker compose logs -f api    # Tail backend logs
#    docker compose down -v        # Stop and remove volumes
# ════════════════════════════════════════════════════════════════════════════

networks:
  qude-net:
    driver: bridge

volumes:
  pgdata:
    name: qude_pgdata
  redisdata:
    name: qude_redisdata

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qude_postgres
    restart: unless-stopped
    networks:
      - qude-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-qude}
      POSTGRES_USER:     ${POSTGRES_USER:-qude_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_strong_password}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qude_user} -d ${POSTGRES_DB:-qude}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qude_redis
    restart: unless-stopped
    networks:
      - qude-net
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: qude_api
    restart: unless-stopped
    networks:
      - qude-net
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV:      ${NODE_ENV:-development}
      POSTGRES_HOST: postgres
      REDIS_HOST:    redis
    volumes:
      - ./backend:/app
      - /app/node_modules              # Preserve container node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: npm run dev

  # ── Admin Dashboard ────────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
      target: development
    container_name: qude_admin
    restart: unless-stopped
    networks:
      - qude-net
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL:    http://localhost:${PORT:-5000}/api
      VITE_SOCKET_URL: http://localhost:${PORT:-5000}
      VITE_APP_NAME:   Qude Admin
    volumes:
      - ./admin-dashboard:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0 --port 3001

  # ── Gate Scanner ───────────────────────────────────────────────────────────
  gate:
    build:
      context: ./gate-scanner
      dockerfile: Dockerfile
      target: development
    container_name: qude_gate
    restart: unless-stopped
    networks:
      - qude-net
    ports:
      - "3002:3002"
    environment:
      VITE_API_URL:    http://localhost:${PORT:-5000}/api
      VITE_SOCKET_URL: http://localhost:${PORT:-5000}
    volumes:
      - ./gate-scanner:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0 --port 3002

  # ── pgAdmin (DB GUI — dev only) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qude_pgadmin
    restart: unless-stopped
    networks:
      - qude-net
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@qude.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools                            # Only starts with: docker compose --profile tools up

  # ── Redis Commander (Redis GUI — dev only) ─────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: qude_redis_ui
    restart: unless-stopped
    networks:
      - qude-net
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    profiles:
      - tools                            # Only starts with: docker compose --profile tools up
